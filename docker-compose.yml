services:
  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: dev
    extra_hosts:
      - ${PLATFORM_HOST}:127.0.0.1
      - ${DEV_S3_HOST:-localhost}:127.0.0.1
    environment:
      # LOMBOK_BUILD_ID is intentionally NOT injected in dev — backend and Vite
      # plugin recompute it live from .lombok-build-id + git so commit/branch
      # changes take effect without a container restart. Prod images bake it in
      # via Dockerfile ENV.
      - DEV_SEED_FILE=${DEV_SEED_FILE:-default.ts}
      - PLATFORM_HOST=${PLATFORM_HOST:-lombok.localhost}
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_NAME=lombok_dev
      - DB_USER=lombokuser_dev
      - DB_PASSWORD=${DB_PASSWORD:-XXXXXXXX}
      - PLATFORM_HTTPS=false
      - PLATFORM_PORT=8080
      - AUTH_JWT_SECRET=00000000000000000000000000000000
      - AUTH_EMAIL_VERIFICATION_JWT_SECRET=00000000000000000000000000000000
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - CREATE_DATABASE=true
      - RUN_MIGRATIONS=true
      - INITIAL_USER=${INITIAL_USER:-dev}
      - DEV_S3_ACCESS_KEY_ID=${DEV_S3_ACCESS_KEY_ID:-lombokdevaccesskey}
      - DEV_S3_SECRET_ACCESS_KEY=${DEV_S3_SECRET_ACCESS_KEY:-lombokdevsecretaccesskey}
      - DEV_S3_BUCKET_NAME=${DEV_S3_BUCKET_NAME:-lombokdevbucket}
      - DEV_S3_PREFIX=${DEV_S3_PREFIX:-dev-local}
      - DEV_S3_REGION=${DEV_S3_REGION:-auto}
      - DEV_S3_ENDPOINT=http://${PLATFORM_HOST:-lombok.localhost}:9000
      - DEV_S3_LABEL=${DEV_S3_LABEL:-MinioDEV}
      - PRINT_CORE_WORKER_OUTPUT=${PRINT_CORE_WORKER_OUTPUT:-true}
      - PRINT_CORE_WORKER_NSJAIL_VERBOSE_OUTPUT=${PRINT_CORE_WORKER_NSJAIL_VERBOSE_OUTPUT:-true}
      - LOMBOK_WORKER_LOG=${LOMBOK_WORKER_LOG:-daemon=info,ipc=warn,timing=off,http=info,task=info,user=debug}
      - LOMBOK_WORKER_LOG_PRETTY=${LOMBOK_WORKER_LOG_PRETTY:-1}
    volumes:
      - ./:/usr/src/app:cached
      - /usr/src/app/node_modules
      - /usr/src/app/packages/api/node_modules
      - /usr/src/app/packages/app-worker-sdk/node_modules
      - /usr/src/app/packages/auth-utils/node_modules
      - /usr/src/app/packages/core-worker/node_modules
      - /usr/src/app/packages/app-browser-sdk/node_modules
      - /usr/src/app/docker/docker-bridge/node_modules
      - /usr/src/app/packages/worker-utils/node_modules
      - /usr/src/app/packages/sdk/node_modules
      - /usr/src/app/packages/types/node_modules
      - /usr/src/app/packages/utils/node_modules
      - /usr/src/app/packages/ui/node_modules
      - /usr/src/app/packages/ui-toolkit/node_modules
      - ${LOCAL_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ${PGDATA_DIR:-pgdata}:/var/lib/postgresql/data
      - ${MINIO_DATA_DIR:-miniodata}:/var/lib/minio/data
      # Worktree fix: a worktree's `.git` file points to an absolute host path
      # under the parent repo's `.git` dir; mount that path verbatim so `git`
      # inside the container resolves worktree refs. Falls through to a no-op
      # mount when not set (regular checkouts don't need it).
      - ${HOST_GIT_COMMON_DIR:-/dev/null}:${HOST_GIT_COMMON_DIR:-/dev/null}:ro
    ports:
      - ${HOST_PLATFORM_PORT:-8080}:8080
      - ${HOST_DB_PORT:-5432}:5432
      - ${HOST_MINIO_PORT:-9000}:9000
    cap_drop: [ALL]
    cap_add:
      - SETUID
      - SETGID
      - SYS_ADMIN
      - SYS_CHROOT
      - SETPCAP
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - seccomp=unconfined
      - no-new-privileges:false
      - apparmor=unconfined
    userns_mode: host

volumes:
  pgdata:
  miniodata:
