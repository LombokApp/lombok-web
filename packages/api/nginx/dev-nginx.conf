js_import app_router from app_router.js;

# App worker API routing — api-server--<worker>--<app>.{{PLATFORM_HOST}}
# Declared before the tunnel server block so regex matching prefers this
# more specific pattern (literal `api-server--` prefix).
server {
    listen 0.0.0.0:8080;
    server_name ~^api-server--(?<worker_ident>[a-z0-9_]+)--(?<app_ident>[a-z0-9_]+)\.{{PLATFORM_HOST}}$;

    location / {
        # CORS (iframe at app-server--<app> calls api-server--<worker>--<app>)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'Authorization, Content-Type' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age           86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials 'true' always;

        proxy_pass {{APP_UI_HOST}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/api_worker_access.log;
    error_log /var/log/nginx/api_worker_error.log;
}

# Tunnel traffic — route tunnel subdomains to bridge tunnel handler
# Subdomain format: {label}--{publicId}--{appId}.{domain}
# The tunnelId is always lowercase alphanumeric (no hyphens), ensuring
# this 3-part pattern doesn't collide with app-server--{name} (2-part).
server {
    listen 0.0.0.0:8080;
    server_name ~^(?<tunnel_label>.+)--(?<tunnel_public_id>[a-z0-9]+)--(?<tunnel_app>[^.]+)\.{{PLATFORM_HOST}}$;

    # Tunnel auth — route to platform API preserving full path
    # (/-/tunnel-auth, /-/tunnel-auth/landing, /-/tunnel-auth/sw.js)
    location ^~ /-/tunnel-auth {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        rewrite ^(.*)$ /-/tunnel$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tunnel-Public-Id $tunnel_public_id;
        proxy_set_header X-Tunnel-Label $tunnel_label;
        proxy_set_header X-Tunnel-App $tunnel_app;

        # WebSocket upgrade support (HMR, live-reload)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Longer timeouts for dev server responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    access_log /var/log/nginx/tunnel_access.log;
    error_log /var/log/nginx/tunnel_error.log;
}

# App host routing
server {
    listen 0.0.0.0:8080;
    server_name ~^app-server--(?<appname>.+)\.{{PLATFORM_HOST}}$;

    resolver 127.0.0.11 ipv6=off valid=30s;

    set $default_app_backend {{APP_UI_HOST}};
    js_set $app_backend app_router.getAppBackend;

    # Socket.IO — WS upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all requests to the app backend (dev-overridable)
    location / {
        proxy_pass $app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/subdomain_access.log;
    error_log /var/log/nginx/subdomain_error.log;
}


# Main domain server block (default for unmatched hosts)
server {
    listen 0.0.0.0:8080 default_server;
    server_name {{PLATFORM_HOST}} _;
    client_max_body_size 3m;

    # Bridge path-based routing — WS attach
    location ~ ^/_bridge/sessions/[^/]+/attach$ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Bridge path-based routing — HTTP
    location /_bridge/ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — WS upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — proxy to Vite dev server (includes HMR WebSocket)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
