js_import app_router from app_router.js;

# App worker API routing — api-server--<worker>--<app>. Declared before the tunnel block so the more specific `api-server--` regex wins.
server {
    listen 0.0.0.0:8080;
    server_name "~^api-server--(?<worker_ident>[a-z0-9_]+)--(?<app_ident>[a-z0-9]+-[a-f0-9]{8})\.{{PLATFORM_HOST}}$";

    location / {
        # CORS (iframe at app-server--<app> calls api-server--<worker>--<app>)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'Authorization, Content-Type' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age           86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials 'true' always;

        proxy_pass {{APP_UI_HOST}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/api_worker_access.log;
    error_log /var/log/nginx/api_worker_error.log;
}

# Tunnel traffic — {label}--{publicId}--{appId}.{domain} to the bridge handler. publicId's `tn-` hyphen can't collide with api-server's hyphen-free worker segment.
server {
    listen 0.0.0.0:8080;
    server_name "~^(?<tunnel_label>[a-z0-9][a-z0-9-]{0,30}[a-z0-9])--(?<tunnel_public_id>tn-[a-f0-9]+)--(?<tunnel_app>[a-z0-9]+-[a-f0-9]{8})\.{{PLATFORM_HOST}}$";

    # Tunnel auth — route to platform API preserving the full path.
    location ^~ /-/tunnel-auth {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        rewrite ^(.*)$ /-/tunnel$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tunnel-Public-Id $tunnel_public_id;
        proxy_set_header X-Tunnel-Label $tunnel_label;
        proxy_set_header X-Tunnel-App $tunnel_app;

        # WebSocket upgrade support (HMR, live-reload)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Longer timeouts for dev server responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    access_log /var/log/nginx/tunnel_access.log;
    error_log /var/log/nginx/tunnel_error.log;
}

# App host routing
server {
    listen 0.0.0.0:8080;
    server_name "~^app-server--(?<appname>[a-z0-9]+-[a-f0-9]{8})\.{{PLATFORM_HOST}}$";

    resolver 127.0.0.11 ipv6=off valid=30s;

    set $default_app_backend {{APP_UI_HOST}};
    js_set $app_backend app_router.getAppBackend;

    # Socket.IO — WS upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all requests to the app backend (dev-overridable)
    location / {
        proxy_pass $app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Show a readable warning instead of a bare 502 when the app's dev server is down.
        error_page 502 503 504 @app_dev_down;
    }

    location @app_dev_down {
        default_type text/html;
        return 502 '<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App backend unreachable</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f4f5; --card: #ffffff; --border: #e4e4e7;
    --text: #18181b; --muted: #52525b;
    --chip-bg: #f4f4f5; --chip-text: #3f3f46;
    --accent: #b45309; --accent-bg: #fef3c7; --accent-border: #fcd34d;
    --bar: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #09090b; --card: #18181b; --border: #27272a;
      --text: #fafafa; --muted: #a1a1aa;
      --chip-bg: #27272a; --chip-text: #e4e4e7;
      --accent: #fbbf24; --accent-bg: #2a2012; --accent-border: #5b4514;
      --bar: #f59e0b;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; padding: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.55;
  }
  .card {
    width: 100%; max-width: 32rem; overflow: hidden;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,.05), 0 12px 32px rgba(0,0,0,.12);
  }
  .bar { height: 4px; background: var(--bar); }
  .body { padding: 1.75rem; }
  .badge {
    display: inline-flex; align-items: center; gap: .45rem;
    font-size: .72rem; font-weight: 600; letter-spacing: .03em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    padding: .3rem .6rem; border-radius: 999px;
  }
  h1 { font-size: 1.2rem; margin: 1rem 0 .35rem; }
  p { margin: .55rem 0; color: var(--muted); font-size: .95rem; }
  code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .85em;
    background: var(--chip-bg); color: var(--chip-text);
    padding: .15em .45em; border-radius: 6px; word-break: break-all;
  }
  .hint {
    margin-top: 1.25rem; padding-top: 1.1rem;
    border-top: 1px solid var(--border); font-size: .9rem;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bar"></div>
  <div class="body">
    <span class="badge">&#9888; 502 &middot; Backend unreachable</span>
    <h1>App dev server is not responding</h1>
    <p>nginx could not reach the backend for <code>$host</code> at <code>$app_backend</code>.</p>
    <p class="hint">If this app points at a local dev server, make sure it is running on that port. After editing <code>packages/ui/.env.development.local</code>, run <code>./dx restart proxies</code> to apply the change.</p>
  </div>
</div>
</body>
</html>';
    }

    access_log /var/log/nginx/subdomain_access.log;
    error_log /var/log/nginx/subdomain_error.log;
}


# Main domain server block (default for unmatched hosts)
server {
    listen 0.0.0.0:8080 default_server;
    server_name {{PLATFORM_HOST}} _;
    client_max_body_size 3m;

    # Bridge path-based routing — WS attach
    location ~ ^/_bridge/sessions/[^/]+/attach$ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Bridge session proxy (REST + SSE). Regex, evaluated before the /_bridge/ prefix below; buffering off so SSE frames flush, long timeouts.
    location ~ ^/_bridge/sessions/[^/]+/proxy/ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;       # verbatim WS upgrades
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;                          # SSE: flush immediately
        proxy_cache off;
        proxy_read_timeout 86400s;                    # long-lived SSE
        proxy_send_timeout 86400s;
    }

    # Bridge path-based routing — HTTP
    location /_bridge/ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — WS upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — proxy to Vite dev server (includes HMR WebSocket)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
