# Tunnel traffic — route tunnel subdomains to bridge tunnel handler
# Subdomain format: {label}--{publicId}--{appId}.{domain}
# The tunnelId is always lowercase alphanumeric (no hyphens), ensuring
# this 3-part pattern doesn't collide with app-server--{name} (2-part).
server {
    listen 0.0.0.0:8080;
    server_name ~^(?<tunnel_label>.+)--(?<tunnel_public_id>[a-z0-9]+)--(?<tunnel_app>[^.]+)\.{{PLATFORM_HOST}}$;

    # Tunnel auth — route to platform API preserving full path
    # (/-/tunnel-auth, /-/tunnel-auth/landing, /-/tunnel-auth/sw.js)
    location ^~ /-/tunnel-auth {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    location / {
        rewrite ^(.*)$ /-/tunnel$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tunnel-Public-Id $tunnel_public_id;
        proxy_set_header X-Tunnel-Label $tunnel_label;
        proxy_set_header X-Tunnel-App $tunnel_app;

        # WebSocket upgrade support (HMR, live-reload)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Longer timeouts for dev server responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    access_log /var/log/nginx/tunnel_access.log;
    error_log /var/log/nginx/tunnel_error.log;
}

# Subdomain routing - route all subdomains to port 3001
# App host routing
server {
    listen 0.0.0.0:8080;
    server_name ~^app-server--(?<appname>.+)\.{{PLATFORM_HOST}}$;

    # Lombok Socket.IO connection
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other requests to the app backend
    location / {
        proxy_pass {{APP_UI_HOST}};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/subdomain_access.log;
    error_log /var/log/nginx/subdomain_error.log;
}

# Main domain server block (default for unmatched hosts)
server {
    listen 0.0.0.0:8080 default_server;
    server_name {{PLATFORM_HOST}} _;

    # Bridge path-based routing — WS attach
    location ~ ^/_bridge/sessions/[^/]+/attach$ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Bridge path-based routing — HTTP
    location /_bridge/ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — WS upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the frontend as static files from the build directory
    location / {
        root /usr/src/app/frontend;
        index index.html;
        try_files $uri /index.html;

        # Add CSP header for iframe support (only for frontend requests)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; child-src 'self'; style-src 'self' 'unsafe-inline'; img-src * blob: data:; media-src https: blob: data:; connect-src *; font-src 'self' data:; frame-src 'self' *.{{PLATFORM_HOST}}:*;" always;
    }

    # Custom 404 handling (serve index.html for unknown routes)
    error_page 404 /index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
