# Builtin S3 (embedded Garage) — s3.{{PLATFORM_HOST}}
# Browser-facing presigned uploads/downloads land here; proxied to the local
# Garage S3 API. Declared first so this exact host wins over the regex blocks.
server {
    listen 0.0.0.0:8080;
    server_name s3.{{PLATFORM_HOST}};
    client_max_body_size 0;            # large/streamed uploads (default)

    # Proxy settings inherited by every location below.
    proxy_http_version 1.1;
    # Verbatim Host incl. port — browser SigV4 signs host:port on ported
    # deployments, so $host (port-stripped) would break the signature.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Standard staging upload size tiers (MB, 2^ scale; 0 = unlimited). Staged
    # uploads live in the fixed `uploads` bucket (S3_UPLOADS_BUCKET must stay
    # `uploads` in production), so path-style keys are always /uploads/{tier}/...
    # — matched anchored at the start of the path. Regex locations win over the
    # `/` prefix below. KEEP THE TIERS IN SYNC with STAGING_TIER_MB in
    # packages/api/src/storage/staging-upload.constants.ts.
    location ~ ^/uploads/0/    { client_max_body_size 0;     proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/1/    { client_max_body_size 1m;    proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/2/    { client_max_body_size 2m;    proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/4/    { client_max_body_size 4m;    proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/8/    { client_max_body_size 8m;    proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/16/   { client_max_body_size 16m;   proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/32/   { client_max_body_size 32m;   proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/64/   { client_max_body_size 64m;   proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/128/  { client_max_body_size 128m;  proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/256/  { client_max_body_size 256m;  proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/512/  { client_max_body_size 512m;  proxy_pass http://127.0.0.1:9000; }
    location ~ ^/uploads/1024/ { client_max_body_size 1024m; proxy_pass http://127.0.0.1:9000; }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        # Verbatim Host incl. port — browser/worker SigV4 signs host:port on
        # ported deployments (e.g. s3.host:8080), so $host (port-stripped) would
        # break the presigned signature.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/s3_access.log;
    error_log /var/log/nginx/s3_error.log;
}

# App worker API routing — api-server--<worker>--<app>.{{PLATFORM_HOST}}
# Declared before the tunnel server block so regex matching prefers this
# more specific pattern (literal `api-server--` prefix).
server {
    listen 0.0.0.0:8080;
    server_name "~^api-server--(?<worker_ident>[a-z0-9_]+)--(?<app_ident>[a-z0-9]+-[a-f0-9]{8})\.{{PLATFORM_HOST}}$";

    location / {
        # CORS (iframe at app-server--<app> calls api-server--<worker>--<app>)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'Authorization, Content-Type' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age           86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials 'true' always;

        proxy_pass {{APP_UI_HOST}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/api_server_access.log;
    error_log /var/log/nginx/api_server_error.log;
}

# Tunnel traffic — route tunnel subdomains to bridge tunnel handler
# Subdomain format: {label}--{publicId}--{appId}.{domain}
# publicId always contains a hyphen, and api-server's worker segment is
# [a-z0-9_]+ (no hyphens), so a tunnel hostname can never satisfy the
# api-server regex — preventing collision.
# appId is <slug>-<8hex>, matching the composed app identifier format.
server {
    listen 0.0.0.0:8080;
    server_name "~^(?<tunnel_label>[a-z0-9][a-z0-9-]{0,30}[a-z0-9])--(?<tunnel_public_id>tn-[a-f0-9]+)--(?<tunnel_app>[a-z0-9]+-[a-f0-9]{8})\.{{PLATFORM_HOST}}$";

    # Tunnel auth — route to platform API preserving full path
    # (/-/tunnel-auth, /-/tunnel-auth/landing, /-/tunnel-auth/sw.js)
    location ^~ /-/tunnel-auth {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    location / {
        rewrite ^(.*)$ /-/tunnel$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tunnel-Public-Id $tunnel_public_id;
        proxy_set_header X-Tunnel-Label $tunnel_label;
        proxy_set_header X-Tunnel-App $tunnel_app;

        # WebSocket upgrade support (HMR, live-reload)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Longer timeouts for dev server responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    access_log /var/log/nginx/tunnel_access.log;
    error_log /var/log/nginx/tunnel_error.log;
}

# Subdomain routing - route all subdomains to port 3001
# App host routing
server {
    listen 0.0.0.0:8080;
    server_name "~^app-server--(?<appname>[a-z0-9]+-[a-f0-9]{8})\.{{PLATFORM_HOST}}$";

    # Lombok Socket.IO connection
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other requests to the app backend
    location / {
        proxy_pass {{APP_UI_HOST}};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/app_server_access.log;
    error_log /var/log/nginx/app_server_error.log;
}

# Main domain server block (default for unmatched hosts)
server {
    listen 0.0.0.0:8080 default_server;
    server_name {{PLATFORM_HOST}} _;
    client_max_body_size 3m;

    # Bridge path-based routing — WS attach
    location ~ ^/_bridge/sessions/[^/]+/attach$ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Bridge path-based routing — session proxy (REST + SSE, streaming)
    # Regex location, evaluated before the /_bridge/ prefix below. Buffering is
    # disabled so SSE frames flush immediately; timeouts are long-lived.
    location ~ ^/_bridge/sessions/[^/]+/proxy/ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;       # verbatim WS upgrades
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;                          # SSE: flush immediately
        proxy_cache off;
        proxy_read_timeout 86400s;                    # long-lived SSE
        proxy_send_timeout 86400s;
    }

    # Bridge path-based routing — HTTP
    location /_bridge/ {
        rewrite ^/_bridge(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — WS upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the frontend as static files from the build directory
    location / {
        root /usr/src/app/frontend;
        index index.html;
        try_files $uri /index.html;

        # Add CSP header for iframe support (only for frontend requests)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; child-src 'self'; style-src 'self' 'unsafe-inline'; img-src * blob: data:; media-src https: blob: data:; connect-src *; font-src 'self' data:; frame-src 'self' *.{{PLATFORM_HOST}}:*;" always;
    }

    # Custom 404 handling (serve index.html for unknown routes)
    error_page 404 /index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
