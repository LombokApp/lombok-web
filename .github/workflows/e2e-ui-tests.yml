name: UI E2E Tests

on:
  push:
    branches:
      - '**'
      - '!main'
  workflow_dispatch:

jobs:
  build-image:
    uses: ./.github/workflows/build-e2e-image.yml
    permissions:
      contents: read
      packages: write

  discover:
    runs-on: ubuntu-latest
    outputs:
      test-files: ${{ steps.list.outputs.test-files }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: packages/api/test/ui

      - name: List UI e2e test files
        id: list
        run: |
          files=$(ls packages/api/test/ui/*.ui-e2e-spec.ts \
            | xargs -n1 basename \
            | sed 's/\.ui-e2e-spec\.ts$//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "test-files=$files" >> "$GITHUB_OUTPUT"

  test:
    needs: [build-image, discover]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        test-file: ${{ fromJson(needs.discover.outputs.test-files) }}
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Run ${{ matrix.test-file }} tests
        run: docker run --rm --privileged ${{ needs.build-image.outputs.image }} -- ui "./**/${{ matrix.test-file }}.ui-e2e-spec.ts"
