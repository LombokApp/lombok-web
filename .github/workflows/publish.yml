name: Publish images
on:
  push:
    tags: ['v*.*.*']

jobs:
  build-and-push-main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/app.Dockerfile
          target: release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/lombokapp/lombok:${{ github.ref_name }}
            ghcr.io/lombokapp/lombok:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-standalone:
    needs: build-and-push-main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/app.Dockerfile
          target: standalone-release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/lombokapp/lombok-standalone:${{ github.ref_name }}
            ghcr.io/lombokapp/lombok-standalone:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
