services:
  lomboke2e:
    container_name: 'lomboke2e'
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: test
    environment:
      PLAYWRIGHT_SHOULD_SAVE_SCREENSHOTS: false
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/packages/api/node_modules
      - /usr/src/app/packages/ui/node_modules
      - /usr/src/app/packages/ui-toolkit/node_modules
      - /usr/src/app/packages/app-worker-sdk/node_modules
      - /usr/src/app/packages/auth-utils/node_modules
      - /usr/src/app/packages/core-worker/node_modules
      - /usr/src/app/packages/worker-utils/node_modules
      - /usr/src/app/packages/sdk/node_modules
      - /usr/src/app/packages/types/node_modules
    privileged: true
  coreworkerutilsunittest:
    container_name: 'lombok-worker-utils-unit-test'
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: test
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    entrypoint: ['bun', '--cwd', './packages/worker-utils', 'test:unit']
    privileged: true
  coreworkerunittest:
    container_name: 'lombok-core-worker-unit-test'
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: test
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    entrypoint: ['bun', '--cwd', './packages/core-worker', 'test:unit']
    privileged: true
  coreworkere2etest:
    container_name: 'lombok-core-worker-e2e-test'
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: test
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
      - ./.test-data/minio:/minio-test-data
    entrypoint: ['bun', '--cwd', './packages/core-worker', 'test:e2e']
